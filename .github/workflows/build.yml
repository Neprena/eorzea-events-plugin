name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore EorzeaEventsPlugin/EorzeaEventsPlugin.csproj

      - name: Build
        run: >
          dotnet build EorzeaEventsPlugin/EorzeaEventsPlugin.csproj
          -c Release
          --no-restore
          /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Package
        shell: bash
        run: |
          mkdir dist
          cp EorzeaEventsPlugin/bin/Release/EorzeaEventsPlugin.dll dist/
          cp EorzeaEventsPlugin/bin/Release/EorzeaEventsPlugin.json dist/
          cp EorzeaEventsPlugin/banner.png dist/
          cd dist && 7z a ../EorzeaEventsPlugin.zip .

      - name: Update repo.json version
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          $json = Get-Content repo.json -Raw | ConvertFrom-Json
          $json[0].AssemblyVersion = "$v.0"
          $json[0].TestingAssemblyVersion = "$v.0"
          $json | ConvertTo-Json -Depth 10 | Set-Content repo.json

      - name: Commit updated repo.json
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git diff --staged --quiet || git commit -m "chore: bump repo.json to ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: EorzeaEventsPlugin.zip
          generate_release_notes: true
